name: A11y Issue Radar

on:
  schedule:
    - cron: '0 8 * * 1'   # jeden Montag 08:00 UTC
  workflow_dispatch:       # Button "Run workflow" für manuellen Test

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan repos for fresh issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail

          REPOS=(
            "dequelabs/axe-core"
            "a11yproject/a11yproject.com"
            "jsx-eslint/eslint-plugin-jsx-a11y"
            "microsoft/accessibility-insights-web"
            "IBM/equal-access"
            "alphagov/accessible-autocomplete"
            "testing-library/jest-dom"
          )
          LABELS=("good first issue" "help wanted" "documentation")

          mkdir -p data
          OUT="data/issues_latest.json"
          TMP="$(mktemp)"

          for repo in "${REPOS[@]}"; do
            for label in "${LABELS[@]}"; do
              echo ">> $repo  /  '$label'"
              gh issue list \
                --repo "$repo" \
                --label "$label" \
                --state open \
                --search "no:assignee sort:updated-desc" \
                --json number,title,url,updatedAt,createdAt,labels,body \
                --limit 30 2>/dev/null \
              | jq -c --arg repo "$repo" --arg label "$label" \
                  '.[] | . + {repo: $repo, queryLabel: $label}' \
                >> "$TMP" || true
            done
          done

          jq -s --arg scanned "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
            {
              scannedAt: $scanned,
              count: (unique_by(.repo + "/" + (.number|tostring)) | length),
              issues: unique_by(.repo + "/" + (.number|tostring))
            }
          ' "$TMP" > "$OUT"

          echo "Total: $(jq '.count' "$OUT") issues -> $OUT"

      - name: Commit result if changed
        run: |
          git config user.name "labrador-bot"
          git config user.email "labrador-bot@users.noreply.github.com"
          git add data/issues_latest.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "chore(a11y-radar): refresh issue scan"
            git push
          fi
