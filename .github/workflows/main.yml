name: A11y Issue Radar
on:
  schedule:
    - cron: '0 8 * * 1'   # Montags 08:00 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Stage 1 - Find candidates (recent + unassigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Grosse Repos (>2500 Stars): 7-Tage-Fenster - hart, taeglicher Issue-Flow
          REPOS_LARGE=(
            # ====== Core a11y testing engines ======
            "dequelabs/axe-core"
            "dequelabs/axe-core-npm"
            "IBM/equal-access"
            "GoogleChrome/lighthouse"
            # ====== A11y linters ======
            "jsx-eslint/eslint-plugin-jsx-a11y"
            # ====== Testing helpers ======
            "testing-library/jest-dom"
            "testing-library/dom-testing-library"
            "testing-library/user-event"
            "component-driven/cypress-axe"
            # ====== A11y CLIs / dashboards ======
            "pa11y/pa11y"
            "pa11y/pa11y-ci"
            "pa11y/pa11y-dashboard"
            # ====== Headless / unstyled a11y component libs ======
            "ariakit/ariakit"
            "adobe/react-spectrum"
            "radix-ui/primitives"
            "downshift-js/downshift"
            # ====== Specialized a11y micro-libs ======
            "focus-trap/focus-trap"
            "focus-trap/focus-trap-react"
            "KittyGiraudel/a11y-dialog"
            "KittyGiraudel/a11y-toggle"
            "KittyGiraudel/react-a11y-dialog"
            "feedzai/react-a11y-tools"
            # ====== W3C / WICG community polyfills ======
            "WICG/aom"
            "WICG/inert"
            "WICG/focus-visible"
            # ====== Cross-platform a11y framework ======
            "AccessKit/accesskit"
            # ====== Screen readers / assistive tech ======
            "nvaccess/nvda"
            # ====== Microsoft a11y suite ======
            "microsoft/accessibility-insights-web"
            # ====== Community / docs ======
            "a11yproject/a11yproject.com"
            # ====== GOV.UK design system ======
            "alphagov/accessible-autocomplete"
            "alphagov/govuk-frontend"
            "alphagov/govuk-design-system"
          )
          # Kleine/mittlere Repos (100-2500 Stars): 14-Tage-Fenster - geduldiger, weil weniger Issue-Volumen
          REPOS_SMALL=(
            # ====== ARIA-Spec-Libs / Foundational ======
            "A11yance/aria-query"
            # ====== Focus-Management Micro-Libs (theKashey) ======
            "theKashey/react-focus-lock"
            "theKashey/focus-lock"
            "theKashey/aria-hidden"
            # ====== Komponenten-Libs ======
            "incluud/accessible-astro-components"
            # ====== Authoring / CMS-a11y ======
            "itmaybejj/editoria11y"
            "ryersondmp/sa11y"
            # ====== CSS-basiertes Flagging ======
            "ffoodd/a11y.css"
          )
          LABELS=("good first issue" "help wanted" "documentation")
          SINCE_LARGE=$(date -u -d '7 days ago'  +%Y-%m-%d)
          SINCE_SMALL=$(date -u -d '14 days ago' +%Y-%m-%d)
          echo "Stage 1 cutoffs: large updated:>=$SINCE_LARGE, small updated:>=$SINCE_SMALL"
          echo "Large repos: ${#REPOS_LARGE[@]}, Small repos: ${#REPOS_SMALL[@]}, Labels: ${#LABELS[@]}"
          mkdir -p data
          TMP="$(mktemp)"
          scan_one() {
            local repo="$1" label="$2" since="$3" class="$4"
            echo ">> [$class] $repo  /  '$label'  (since $since)"
            gh issue list \
              --repo "$repo" \
              --label "$label" \
              --state open \
              --search "no:assignee updated:>=$since sort:updated-desc" \
              --json number,title,url,updatedAt,createdAt,labels \
              --limit 30 2>/dev/null \
            | jq -c --arg repo "$repo" --arg queryLabel "$label" --arg repoClass "$class" \
                '.[] | . + {repo: $repo, queryLabel: $queryLabel, repoClass: $repoClass}' \
              >> "$TMP" || true
          }
          for repo in "${REPOS_LARGE[@]}"; do
            for label in "${LABELS[@]}"; do
              scan_one "$repo" "$label" "$SINCE_LARGE" "large"
            done
          done
          for repo in "${REPOS_SMALL[@]}"; do
            for label in "${LABELS[@]}"; do
              scan_one "$repo" "$label" "$SINCE_SMALL" "small"
            done
          done
          jq -s 'unique_by(.repo + "/" + (.number|tostring))' "$TMP" > data/candidates.json
          rm -f "$TMP"
          echo "Stage 1: $(jq 'length' data/candidates.json) unique candidates"
          echo "  large: $(jq '[.[] | select(.repoClass == "large")] | length' data/candidates.json)"
          echo "  small: $(jq '[.[] | select(.repoClass == "small")] | length' data/candidates.json)"

      - name: Stage 2 - Enrich (body + comments + linked open PRs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p data
          ENRICHED="data/enriched.json"
          echo "[]" > "$ENRICHED"
          jq -c '.[]' data/candidates.json | while read -r row; do
            repo=$(echo "$row" | jq -r .repo)
            num=$(echo "$row" | jq -r .number)
            label=$(echo "$row" | jq -r .queryLabel)
            class=$(echo "$row" | jq -r '.repoClass // "large"')
            echo ">> enrich $repo#$num ($class)"
            # Issue + comments
            full=$(gh issue view "$num" --repo "$repo" \
              --json number,title,url,body,createdAt,updatedAt,labels,comments,author \
              2>/dev/null) || full="{}"
            # Verknuepfte offene PRs (closes/fixes/resolves #N im PR-Body)
            linked_prs=$(gh pr list \
              --repo "$repo" \
              --state open \
              --search "$num" \
              --json number,title,url,body,createdAt \
              --limit 10 2>/dev/null \
              | jq --arg n "$num" '
                  [.[]
                    | select((.body // "")
                        | test("(?i)(close[sd]?|fix(e[sd])?|resolve[sd]?)\\s*[:\\s]?\\s*#" + $n + "\\b")
                       or ((.body // "") | test("(?i)(closes|fixes|resolves|see)\\s+(issue\\s+)?#" + $n + "\\b")))
                    | {number, title, url, createdAt}
                  ]' 2>/dev/null) || linked_prs="[]"
            [ -z "$linked_prs" ] && linked_prs="[]"
            merged=$(echo "$full" | jq \
              --arg repo "$repo" \
              --arg ql "$label" \
              --arg rc "$class" \
              --argjson lpr "$linked_prs" \
              '. + {repo: $repo, queryLabel: $ql, repoClass: $rc, linkedOpenPRs: $lpr}')
            jq --argjson item "$merged" '. += [$item]' "$ENRICHED" > "$ENRICHED.tmp" \
              && mv "$ENRICHED.tmp" "$ENRICHED"
          done
          echo "Stage 2: $(jq 'length' $ENRICHED) issues enriched"
          echo "  with linked open PRs: $(jq '[.[] | select(.linkedOpenPRs | length > 0)] | length' $ENRICHED)"

      - name: Stage 3 - Score, filter (large=7d, small=14d), rank
        run: |
          set -uo pipefail
          jq '
            def is_maintainer:
              .authorAssociation == "OWNER"
              or .authorAssociation == "MEMBER"
              or .authorAssociation == "COLLABORATOR";
            def is_recent(c; days):
              ((now - (c.createdAt | fromdateiso8601)) < (days * 86400));
            def maintainer_green(cs):
              cs
              | map(select(is_maintainer))
              | map(select(
                  ((.body // "") | ascii_downcase)
                  | test("pr welcome|welcome a (pr|pull request)|would accept|happy to (review|accept)|contributions welcome|please (open|submit) a pr|that.?d be great|sounds good")
                ))
              | length;
            def maintainer_red(cs):
              cs
              | map(select(is_maintainer))
              | map(select(
                  ((.body // "") | ascii_downcase)
                  | test("won.?t fix|will not (fix|implement)|no longer relevant|out of scope|wontfix|stale|closing( as)?|not planned|need to (test|investigate|check) (this )?first|let me (test|check)|extensive testing")
                ))
              | length;
            def claimed_recent(cs):
              cs
              | map(select(is_recent(.; 120)))
              | map(select(
                  ((.body // "") | ascii_downcase)
                  | test("i.?ll (work|take) (on )?this|i.?ll do this|taking this|i can (do|take) this|i.?m on it|working on this|let me work on|please assign( me)?|assign( me)?|could i (open|create|submit|raise) a pr|may i (work on|take|tackle)|would (love|like) to (work|take|tackle)|happy to (take|tackle|work on)|i would like to (work on|take|tackle)|here is the pr|i.?ve (opened|submitted|created) (a |the )?pr|see pr #")
                ))
              | length;
            def pr_submitted(cs):
              cs
              | map(select(
                  ((.body // "") | ascii_downcase)
                  | test("(submitted|opened|created|here.?s|here is) (a |the )?(pr|pull request) #|see pr #|fixes? in #|merged in #|closed in #|resolved (by |in )#")
                ))
              | length;
            def checkbox_progress(b):
              {
                total: (b | [scan("- \\[[ xX]\\]")] | length),
                done:  (b | [scan("- \\[[xX]\\]")]   | length)
              };
            def days_since(ts):
              if (ts == null or ts == "") then 9999
              else ((now - (ts | fromdateiso8601)) / 86400) | floor
              end;
            def recent_activity_score(cs):
              cs
              | map(select(is_recent(.; 60)))
              | length;
            def score:
              . as $i
              | (.comments // []) as $cs
              | (.body // "") as $b
              | (.linkedOpenPRs // []) as $lpr
              | checkbox_progress($b) as $cb
              | (if $cb.total > 0 then ($cb.done / $cb.total) else 0 end) as $cb_ratio
              | days_since(.updatedAt) as $age_upd
              | days_since(.createdAt) as $age_cre
              | maintainer_green($cs) as $mg
              | maintainer_red($cs)   as $mr
              | claimed_recent($cs)   as $cl
              | pr_submitted($cs)     as $pr
              | recent_activity_score($cs) as $rec_act
              | ($lpr | length) as $lpr_count
              | (
                  (if $age_upd < 14 then 20 elif $age_upd < 30 then 12 elif $age_upd < 90 then 6 else 1 end)
                  + (if $age_cre < 90 then 25 elif $age_cre < 365 then 12 elif $age_cre < 730 then 4 else 0 end)
                  + ($mg * 18)
                  + ($mr * -45)
                  + ($cl * -40)
                  + ($pr * -50)
                  + ($lpr_count * -100)
                  + ($rec_act * 2)
                  + (if ($cb.total > 5 and $cb_ratio >= 0.7) then -25 else 0 end)
                  + (if ($cs | length) > 80 then -20 elif ($cs | length) > 40 then -8 else 0 end)
                ) as $s
              | {
                  score: $s,
                  repo: .repo,
                  number: .number,
                  title: .title,
                  url: .url,
                  queryLabel: .queryLabel,
                  labels: [.labels[]?.name],
                  createdAt: .createdAt,
                  updatedAt: .updatedAt,
                  daysSinceUpdate: $age_upd,
                  daysSinceCreate: $age_cre,
                  commentCount: ($cs | length),
                  recentActivity: $rec_act,
                  maintainerGreen: $mg,
                  maintainerRed: $mr,
                  claimedRecent: $cl,
                  prSubmitted: $pr,
                  linkedOpenPRs: $lpr,
                  checkboxes: $cb,
                  bodyExcerpt: ($b | gsub("\r"; "") | .[0:300]),
                  recentComments: (
                    $cs
                    | sort_by(.createdAt) | reverse | .[0:3]
                    | map({
                        author: (.author.login // "?"),
                        association: (.authorAssociation // "NONE"),
                        createdAt: .createdAt,
                        excerpt: ((.body // "") | gsub("\r"; "") | .[0:200])
                      })
                  )
                };
            map(select(.number != null and .updatedAt != null))
            | map(score + {repoClass: (.repoClass // "large")})
            | map(select(
                (.repoClass == "large" and .daysSinceUpdate < 7)
                or (.repoClass == "small" and .daysSinceUpdate < 14)
              ))
            | sort_by(-.score)
            | {
                scannedAt: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
                count: length,
                countLarge: ([.[] | select(.repoClass == "large")] | length),
                countSmall: ([.[] | select(.repoClass == "small")] | length),
                topIssues: (.[0:15]),
                allRanked: (
                  map({
                    score, repo, repoClass, number, title, url,
                    daysSinceUpdate, claimedRecent, prSubmitted,
                    linkedOpenPRs: (.linkedOpenPRs | length),
                    maintainerGreen,
                    maintainerRed
                  })
                )
              }
          ' data/enriched.json > data/ranked.json
          echo "Stage 3: ranked $(jq '.count' data/ranked.json) issues total"
          echo "  large (7d):  $(jq '.countLarge' data/ranked.json)"
          echo "  small (14d): $(jq '.countSmall' data/ranked.json)"

      - name: Stage 4 - Commit ranked output
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ranked.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(radar): update a11y issue ranking"
            git push
          fi
